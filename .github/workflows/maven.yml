name: APIM builder

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  M2_REPO: ${{ github.workspace }}/.m2-cif
  CIF_REPOSITORY: Oshanath/carbon-identity-framework-public
  CIF_REF: 5.27.x

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: 1
            segment: group1
          - id: 2
            segment: group2
          - id: 3
            segment: group3
          - id: 4
            segment: group4
      fail-fast: false
    steps:
      - name: Checkout product-apim
        uses: actions/checkout@v4

      - name: Checkout carbon-identity-framework fork
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CIF_REPOSITORY }}
          ref: ${{ env.CIF_REF }}
          path: carbon-identity-framework

      - name: Cache isolated Maven repo
        uses: actions/cache@v4
        with:
          path: ${{ env.M2_REPO }}
          key: >
            ${{ runner.os }}-cif-apim-${{ hashFiles('carbon-identity-framework/pom.xml', 'carbon-identity-framework/**/pom.xml', 'all-in-one-apim/pom.xml') }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '10.x'

      - name: Build carbon-identity-framework fork
        working-directory: carbon-identity-framework
        run: |
          mvn clean install -Dmaven.test.skip=true -Dmaven.repo.local="${M2_REPO}"

      - name: Build product-apim integration tests
        env:
          PRODUCT_APIM_TEST_GROUPS: ${{ matrix.segment }}
        run: |
          mvn clean install --file all-in-one-apim/pom.xml \
            -DskipBenchMarkTest=true \
            -DskipRestartTests=true \
            -Dmaven.repo.local="${M2_REPO}"
  show-report:
    if: ${{ always() && !cancelled() }}
    needs: build
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports
      - name: Publish Test Report
        if: always()
        uses: malinthaprasan/action-surefire-report@v1
        with:
          report_paths: 'reports/**/TEST-*.xml'
